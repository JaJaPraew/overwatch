<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OW2 Counters 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-page: #f2f5f9; --bg-card: #ffffff; --primary-blue: #93c5fd; --text-dark: #334155; --text-light: #94a3b8; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-page); color: var(--text-dark); margin: 0; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .app-card { background-color: var(--bg-card); max-width: 1000px; width: 100%; border-radius: 30px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); text-align: center; }
        h1 { font-family: 'Itim', cursive; color: var(--text-dark); font-size: 2.8em; margin-bottom: 5px; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; margin-top: 30px; }
        .hero-card { background-color: var(--bg-page); border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .hero-card:hover { border: 2px solid var(--primary-blue); transform: translateY(-5px); }
        .hero-avatar-box { width: 80px; height: 80px; border-radius: 20px; background: #e2e8f0; overflow: hidden; position: relative; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .matchup-container { margin-top: 30px; padding: 20px; background: var(--bg-page); border-radius: 20px; display: none; }
        .counter-tag { background: var(--primary-blue); color: white; padding: 5px 15px; border-radius: 20px; margin: 5px; display: inline-block; font-family: 'Itim'; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>OW2 Counter Picker 💙</h1>
    <div class="hero-grid" id="heroGrid"></div>
    <div class="matchup-container" id="matchupContainer">
        <h3>🎮 ตัวแก้ทาง</h3>
        <div id="weakList"></div>
    </div>
</div>

<script>
    // ตารางจับคู่ชื่อฮีโร่กับชื่อไฟล์ในโฟลเดอร์ images (ห้ามมี .png ในนี้)
    const fileMap = {
        'Ana': 'ana', 'Anran': 'anran', 'Ashe': 'ashe', 'Baptiste': 'baptiste', 'Bastion': 'bastion',
        'Brigitte': 'brigitte', 'Cassidy': 'cassidy', 'D.Va': 'dva', 'Domina': 'domina', 'Doomfist': 'doomfist',
        'Echo': 'echo', 'Emre': 'emre', 'Freja': 'freja', 'Genji': 'genji', 'Hanzo': 'hanzo', 'Hazard': 'hazard',
        'Illari': 'illari', 'Jetpack Cat': 'jetpackcat', 'Junker Queen': 'junkerqueen', 'Junkrat': 'junkrat',
        'Juno': 'juno', 'Kiriko': 'kiriko', 'Lifeweaver': 'lifeweaver', 'Lúcio': 'lucio', 'Mauga': 'mauga',
        'Mei': 'mei', 'Mercy': 'mercy', 'Mizuki': 'mizuki', 'Moira': 'moira', 'Orisa': 'orisa', 'Pharah': 'pharah',
        'Ramattra': 'ramattra', 'Reaper': 'reaper', 'Reinhardt': 'reinhardt', 'Roadhog': 'roadhog', 'Shion': 'shion',
        'Sierra': 'sierra', 'Sigma': 'sigma', 'Sojourn': 'sojourn', 'Soldier: 76': 'soldier76', 'Sombra': 'sombra',
        'Symmetra': 'symmetra', 'Torbjörn': 'torbjorn', 'Tracer': 'tracer', 'Vendetta': 'vendetta', 'Venture': 'venture',
        'Widowmaker': 'widowmaker', 'Winston': 'winston', 'Wrecking Ball': 'wreckingball', 'Wuyang': 'wuyang',
        'Zarya': 'zarya', 'Zenyatta': 'zenyatta'
    };

    const heroesData = [
        { name: 'Ana', role: 'Support', counters: ['Kiriko', 'D.Va', 'Genji'] },
        { name: 'Lúcio', role: 'Support', counters: ['Sombra', 'Cassidy'] },
        { name: 'Soldier: 76', role: 'Damage', counters: ['Winston', 'D.Va'] }
        // ... เติมข้อมูลต่อจากตรงนี้ให้ครบนะครับ
    ];

    function renderHeroes() {
        const grid = document.getElementById('heroGrid');
        heroesData.forEach(h => {
            const fileName = fileMap[h.name] || 'default';
            grid.innerHTML += `
                <div class="hero-card" onclick="showCounters('${h.name}')">
                    <div class="hero-avatar-box">
                        <img src="./images/${fileName}.png" class="hero-img" onerror="this.style.display='none'">
                    </div>
                    <div>${h.name}</div>
                </div>`;
        });
    }

    function showCounters(name) {
        const hero = heroesData.find(h => h.name === name);
        document.getElementById('matchupContainer').style.display = 'block';
        document.getElementById('weakList').innerHTML = hero.counters.map(c => `<span class="counter-tag">${c}</span>`).join('');
    }

    renderHeroes();
</script>
</body>
</html>
