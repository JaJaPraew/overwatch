<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OW2 Counters 💙</title>
    <!-- นำเข้าฟอนต์ Itim และ Kanit จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f2f5f9; 
            --bg-card: #ffffff; 
            --primary-blue: #93c5fd; 
            --primary-hover: #7db6f8;
            --text-dark: #334155;
            --text-light: #94a3b8;
        }

        body {
            /* ใช้ฟอนต์หลักเป็น Kanit เพื่อให้อ่านง่ายสำหรับข้อความทั่วไป */
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-card {
            background-color: var(--bg-card);
            max-width: 900px;
            width: 100%;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
        }

        h1 {
            /* เปลี่ยนหัวข้อเป็นฟอนต์ Itim */
            font-family: 'Itim', cursive;
            color: var(--text-dark);
            font-size: 2.8em;
            margin-bottom: 5px;
            margin-top: 0;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.95em;
            margin-bottom: 30px;
            font-family: 'Kanit', sans-serif;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .filter-btn {
            /* เปลี่ยนปุ่มเป็นฟอนต์ Itim */
            font-family: 'Itim', cursive;
            background-color: var(--bg-page);
            color: var(--text-light);
            border: none;
            padding: 12px 30px;
            border-radius: 50px; 
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background-color: #e2e8f0;
            color: var(--text-dark);
        }

        .filter-btn.active {
            background-color: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(147, 197, 253, 0.5);
        }

        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .hero-card {
            background-color: var(--bg-page);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hero-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary-blue);
        }

        .hero-card.selected {
            background-color: white;
            border-color: var(--primary-blue);
            box-shadow: 0 8px 15px rgba(147, 197, 253, 0.2);
        }

        .hero-name {
            /* เปลี่ยนชื่อฮีโร่เป็นฟอนต์ Itim */
            font-family: 'Itim', cursive;
            color: var(--text-dark);
            font-size: 1.25em;
        }

        .hero-role {
            font-size: 0.8em;
            color: var(--text-light);
            margin-top: 4px;
        }

        .matchup-container {
            display: none;
            background-color: var(--bg-page);
            border-radius: 25px;
            padding: 30px;
            animation: fadeIn 0.4s ease;
        }

        .matchup-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .matchup-box h3 {
            /* เปลี่ยนหัวข้อการแก้ทางเป็นฟอนต์ Itim */
            font-family: 'Itim', cursive;
            color: var(--text-dark);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .counter-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .counter-tag {
            background-color: var(--primary-blue);
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            /* เปลี่ยนชื่อฮีโร่แก้ทางเป็นฟอนต์ Itim */
            font-family: 'Itim', cursive;
            font-size: 1.1em;
            box-shadow: 0 4px 10px rgba(147, 197, 253, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .footer {
            margin-top: 40px;
            font-size: 0.85em;
            color: #cbd5e1;
            font-family: 'Kanit', sans-serif;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h1>OW2 Counter Picker 💙</h1>
    <div class="subtitle">เช็คตัวแก้ทางแพทช์ล่าสุด (SEA Meta)</div>
    
    <div class="filters" id="filters">
        <button class="filter-btn active" onclick="filterHeroes('All')">ทั้งหมด</button>
        <button class="filter-btn" onclick="filterHeroes('Tank')">Tank</button>
        <button class="filter-btn" onclick="filterHeroes('Damage')">Damage</button>
    </div>

    <div class="hero-grid" id="heroGrid">
        <!-- ตัวละครจะถูกสร้างที่นี่ -->
    </div>

    <div class="matchup-container" id="matchupContainer">
        <div class="matchup-box">
            <h3>🎮 ควรหยิบตัวอะไรมาแก้ทางดี?</h3>
            <div class="counter-grid" id="weakList"></div>
        </div>
    </div>
    
    <div class="footer">
        © 2026 OW2 Counters. All rights reserved.
    </div>
</div>

<script>
    // ข้อมูลอัพเดตล่าสุด
    const heroesData = [
        { id: 'dva', name: 'D.Va', role: 'Tank', counters: ['Zarya', 'Roadhog', 'Symmetra', 'Mei', 'Sombra', 'Brigitte'] },
        { id: 'doomfist', name: 'Doomfist', role: 'Tank', counters: ['Orisa', 'Roadhog', 'Zarya', 'Cassidy', 'Sombra', 'Junkrat', 'Mei', 'Ana', 'Brigitte'] },
        { id: 'orisa', name: 'Orisa', role: 'Tank', counters: ['Zarya', 'Roadhog', 'Symmetra', 'Bastion', 'Echo', 'Zenyatta'] },
        { id: 'ramattra', name: 'Ramattra', role: 'Tank', counters: ['Orisa', 'Zarya', 'Mauga', 'Bastion', 'Mei', 'Ana', 'Zenyatta'] },
        { id: 'reinhardt', name: 'Reinhardt', role: 'Tank', counters: ['Ramattra', 'Orisa', 'Bastion', 'Pharah', 'Mei', 'Junkrat', 'Symmetra', 'Sombra'] },
        { id: 'roadhog', name: 'Roadhog', role: 'Tank', counters: ['Zarya', 'Mauga', 'Orisa', 'Ana', 'Zenyatta', 'Reaper', 'Mei', 'Sombra'] },
        { id: 'sigma', name: 'Sigma', role: 'Tank', counters: ['Reinhardt', 'Ramattra', 'Winston', 'Zarya', 'Symmetra', 'Mei', 'Sombra'] },
        { id: 'winston', name: 'Winston', role: 'Tank', counters: ['D.Va', 'Roadhog', 'Mauga', 'Reaper', 'Bastion', 'Torbjorn', 'Brigitte'] },
        { id: 'wreckingball', name: 'Wrecking Ball', role: 'Tank', counters: ['Roadhog', 'Mauga', 'Sombra', 'Mei', 'Cassidy', 'Brigitte'] },
        { id: 'zarya', name: 'Zarya', role: 'Tank', counters: ['Reinhardt', 'Ramattra', 'Winston', 'Bastion', 'Pharah', 'Widowmaker', 'Lifeweaver'] },
        { id: 'tracer', name: 'Tracer', role: 'Damage', counters: ['Zarya', 'Cassidy', 'Echo', 'Pharah', 'Reaper', 'Sombra', 'Brigitte'] },
        { id: 'sojourn', name: 'Sojourn', role: 'Damage', counters: ['Zarya', 'Winston', 'D.Va', 'Doomfist'] },
        { id: 'soldier76', name: 'Soldier: 76', role: 'Damage', counters: ['Winston', 'D.Va', 'Tracer', 'Cassidy', 'Pharah', 'Reaper'] },
        { id: 'cassidy', name: 'Cassidy', role: 'Damage', counters: ['Zarya', 'D.Va', 'Ashe', 'Widowmaker', 'Hanzo'] },
        { id: 'reaper', name: 'Reaper', role: 'Damage', counters: ['Zarya', 'D.Va', 'Winston', 'Pharah', 'Echo', 'Widowmaker', 'Hanzo'] },
        { id: 'pharah', name: 'Pharah', role: 'Damage', counters: ['D.Va', 'Winston', 'Soldier: 76', 'Cassidy', 'Ashe', 'Widowmaker', 'Echo'] },
        { id: 'echo', name: 'Echo', role: 'Damage', counters: ['D.Va', 'Soldier: 76', 'Cassidy', 'Ashe', 'Widowmaker', 'Sombra'] },
        { id: 'sombra', name: 'Sombra', role: 'Damage', counters: ['Winston', 'Zarya', 'Mei', 'Pharah', 'Hanzo', 'Kiriko', 'Brigitte'] },
        { id: 'mei', name: 'Mei', role: 'Damage', counters: ['Pharah', 'Echo', 'Widowmaker', 'Hanzo', 'Ashe'] },
        { id: 'junkrat', name: 'Junkrat', role: 'Damage', counters: ['Pharah', 'Echo', 'Widowmaker', 'Ashe', 'Soldier: 76'] },
        { id: 'torbjorn', name: 'Torbjörn', role: 'Damage', counters: ['Pharah', 'Echo', 'Junkrat', 'Widowmaker', 'Hanzo'] },
        { id: 'hanzo', name: 'Hanzo', role: 'Damage', counters: ['D.Va', 'Winston', 'Tracer', 'Genji', 'Sombra', 'Pharah'] },
        { id: 'widowmaker', name: 'Widowmaker', role: 'Damage', counters: ['Winston', 'D.Va', 'Wrecking Ball', 'Tracer', 'Genji', 'Sombra'] },
        { id: 'ashe', name: 'Ashe', role: 'Damage', counters: ['Winston', 'D.Va', 'Widowmaker', 'Tracer', 'Genji'] },
        { id: 'bastion', name: 'Bastion', role: 'Damage', counters: ['Genji', 'Sigma', 'D.Va', 'Hanzo', 'Ana', 'Sombra'] },
        { id: 'symmetra', name: 'Symmetra', role: 'Damage', counters: ['Winston', 'Pharah', 'Echo', 'Junkrat', 'Widowmaker'] },
        { id: 'genji', name: 'Genji', role: 'Damage', counters: ['Winston', 'Zarya', 'Symmetra', 'Mei', 'Moira', 'Pharah'] }
    ];

    function renderHeroes(filterValue) {
        const grid = document.getElementById('heroGrid');
        grid.innerHTML = ''; 
        
        const filtered = filterValue === 'All' 
            ? heroesData 
            : heroesData.filter(h => h.role === filterValue);

        filtered.forEach(hero => {
            const card = document.createElement('div');
            card.className = 'hero-card';
            card.id = `hero-${hero.id}`;
            card.onclick = () => selectHero(hero.id);
            
            card.innerHTML = `
                <div class="hero-name">${hero.name}</div>
                <div class="hero-role">${hero.role}</div>
            `;
            grid.appendChild(card);
        });
    }

    function filterHeroes(role) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('matchupContainer').classList.remove('active');
        renderHeroes(role);
    }

    function selectHero(id) {
        document.querySelectorAll('.hero-card').forEach(card => card.classList.remove('selected'));
        document.getElementById(`hero-${id}`).classList.add('selected');

        const hero = heroesData.find(h => h.id === id);
        if(!hero) return;

        const weakList = document.getElementById('weakList');
        
        weakList.innerHTML = hero.counters.length ? hero.counters.map(name => {
            return `<div class="counter-tag">🎯 ${name}</div>`;
        }).join('') : '<div class="counter-tag">ไม่มีข้อมูลในตาราง</div>';

        document.getElementById('matchupContainer').classList.add('active');
    }

    renderHeroes('All');
</script>

</body>
</html>
